<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferência DePIX</title>

    <link rel="icon" type="image/png" id="faviconLink" href="">

    <meta property="og:title" content="Transferência DePIX">
    <meta property="og:description" content="Realize sua transferência via DePIX de forma rápida e segura. PIX integrado à rede Liquid com processamento automático.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="PixPay">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Transferência DePIX">
    <meta name="twitter:description" content="Sistema de transferência automático via DePIX. Seguro, rápido e integrado à Liquid Network.">

    <meta name="description" content="Realize sua transferência via DePIX. Sistema seguro, automatizado e com monitoramento em tempo real.">

    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --blue-900: #0a0f2e;
            --blue-800: #0d1545;
            --blue-700: #0f1f6b;
            --blue-600: #1338be;
            --blue-500: #1a56db;
            --blue-400: #3b82f6;
            --blue-300: #60a5fa;
            --blue-200: #bfdbfe;
            --blue-100: #dbeafe;
            --accent: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.3);
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--blue-900);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(19, 56, 190, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 50% 50%, rgba(26, 86, 219, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(59, 130, 246, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 520px;
        }

        .brand-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
            animation: fadeSlideDown 0.6s ease forwards;
        }

        .brand-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            object-fit: contain;
            display: none;
        }

        .brand-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--blue-200);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .brand-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .container {
            background: linear-gradient(145deg, rgba(13, 21, 69, 0.9), rgba(10, 15, 46, 0.95));
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 20px;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(0, 212, 255, 0.05),
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(19, 56, 190, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            animation: fadeSlideUp 0.7s ease forwards;
        }

        .card-header {
            padding: 28px 32px 24px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
            background: linear-gradient(135deg, rgba(19, 56, 190, 0.2), rgba(26, 86, 219, 0.1));
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .card-title-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--blue-600), var(--blue-500));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 16px rgba(19, 56, 190, 0.4);
            flex-shrink: 0;
        }

        .card-title h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: -0.02em;
        }

        .card-subtitle {
            font-size: 13px;
            color: rgba(148, 183, 255, 0.6);
            margin-top: 2px;
            font-weight: 400;
        }

        .security-badges {
            display: flex;
            gap: 8px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .badge {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        .badge-secure {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: var(--accent);
        }

        .badge-auto {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--blue-300);
        }

        .badge-liquid {
            background: rgba(96, 165, 250, 0.08);
            border: 1px solid rgba(96, 165, 250, 0.2);
            color: var(--blue-200);
        }

        .content { padding: 28px 32px 32px; }

        .form-group { margin-bottom: 18px; }

        label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-weight: 500;
            font-size: 13px;
            color: var(--blue-200);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        .label-icon { font-size: 15px; opacity: 0.8; }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            transition: all 0.25s ease;
            outline: none;
        }

        input::placeholder {
            color: rgba(148, 183, 255, 0.3);
            font-size: 13px;
        }

        input:focus, select:focus {
            background: rgba(59, 130, 246, 0.08);
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.08), 0 0 20px rgba(0, 212, 255, 0.05);
        }

        .amount-input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 14px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: rgba(148, 183, 255, 0.4);
            pointer-events: none;
            transition: color 0.2s;
        }

        .amount-input-wrap:focus-within .currency-symbol {
            color: rgba(0, 212, 255, 0.6);
        }

        #valor {
            padding-left: 38px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
        }

        .input-with-toggle {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-with-toggle input { padding-right: 44px; }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            color: rgba(148, 183, 255, 0.4);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            transition: color 0.2s;
            line-height: 1;
        }

        .toggle-password:hover { color: var(--accent); }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn-submit {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--blue-600) 0%, var(--blue-500) 50%, #2563eb 100%);
            color: var(--white);
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 20px rgba(19, 56, 190, 0.5);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover::before { left: 100%; }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(19, 56, 190, 0.6), 0 0 20px rgba(0, 212, 255, 0.15);
        }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled {
            background: rgba(59, 130, 246, 0.2);
            color: rgba(148, 183, 255, 0.4);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-submit:disabled::before { display: none; }

        .btn-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .error-state {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 14px 16px;
            background: rgba(239, 68, 68, 0.06);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 13px;
            margin-top: 16px;
            line-height: 1.5;
        }

        .processing-state {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: rgba(59, 130, 246, 0.06);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            color: var(--blue-200);
            font-size: 14px;
            margin-top: 16px;
        }

        .processing-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        .result-container {
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 14px;
            overflow: hidden;
        }

        .result-header {
            padding: 16px 20px;
            background: linear-gradient(135deg, rgba(19, 56, 190, 0.3), rgba(26, 86, 219, 0.15));
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-header-title {
            font-weight: 600;
            font-size: 14px;
            color: var(--white);
        }

        .result-header-sub {
            font-size: 12px;
            color: var(--blue-300);
            margin-top: 1px;
        }

        .result-body { padding: 20px; }

        .qr-wrapper {
            text-align: center;
            padding: 14px;
            background: white;
            border-radius: 12px;
            margin: 0 auto 20px;
            width: fit-content;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .qr-wrapper img { display: block; }

        .qr-hint {
            font-size: 11px;
            color: rgba(148, 183, 255, 0.4);
            margin-top: 8px;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .info-card {
            padding: 12px 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(59, 130, 246, 0.15);
            border-radius: 10px;
        }

        .info-card-label {
            font-size: 11px;
            color: rgba(148, 183, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .info-card-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--white);
            font-family: 'JetBrains Mono', monospace;
        }

        .info-card-value.accent { color: var(--accent); }

        .address-block { margin-bottom: 16px; }

        .address-label {
            font-size: 12px;
            color: rgba(148, 183, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .address-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .address-row input {
            flex: 1;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 10px 12px;
            color: var(--blue-200);
        }

        .copy-btn {
            padding: 10px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.25);
            color: var(--accent);
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: 'Sora', sans-serif;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: rgba(0, 212, 255, 0.18);
            box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
        }

        .copy-section { margin-bottom: 16px; }

        .copy-label {
            font-size: 11px;
            color: rgba(148, 183, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .copy-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }

        .copy-input {
            flex: 1;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 10px;
            color: var(--blue-200);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            resize: none;
            height: 60px;
            outline: none;
            word-break: break-all;
            transition: all 0.25s;
        }

        .btn-copy-main {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--blue-600) 0%, var(--blue-500) 50%, #2563eb 100%);
            color: var(--white);
            font-family: 'Sora', sans-serif;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 20px rgba(19, 56, 190, 0.5);
        }

        .btn-copy-main::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            transition: left 0.5s ease;
        }

        .btn-copy-main:hover::before { left: 100%; }
        .btn-copy-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(19, 56, 190, 0.6), 0 0 20px rgba(0, 212, 255, 0.15);
        }
        .btn-copy-main.copied {
            background: linear-gradient(135deg, #059669, var(--success));
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        .meta-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 14px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(59, 130, 246, 0.1);
            border-radius: 10px;
            margin-bottom: 14px;
            font-size: 13px;
            color: var(--blue-200);
        }

        .meta-row span { display: flex; align-items: center; gap: 6px; }
        .meta-row b { color: var(--white); }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.2), transparent);
            margin: 20px 0;
        }

        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(148, 183, 255, 0.35);
            animation: fadeSlideUp 1s ease forwards;
            letter-spacing: 0.02em;
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(0, 212, 255, 0); }
        }

        @media (max-width: 480px) {
            .content { padding: 24px 20px 28px; }
            .card-header { padding: 24px 20px 20px; }
            .form-row { grid-template-columns: 1fr; }
            .info-grid { grid-template-columns: 1fr; }
            .copy-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <div class="brand-badge" id="brandBadge">
        <img class="brand-logo" id="brandLogo" src="" alt="Logo">
        <span class="brand-name" id="brandUserName">PixPay</span>
        <span class="brand-dot"></span>
        <span class="brand-name" style="color: rgba(148,183,255,0.4)">DePIX</span>
    </div>

    <div class="container">

        <div class="card-header">
            <div class="card-title">
                <div class="card-title-icon">💸</div>
                <div>
                    <h2>Transferência DePIX</h2>
                    <div class="card-subtitle">Transferência via Liquid Network · Processamento automático</div>
                </div>
            </div>
            <div class="security-badges">
                <span class="badge badge-secure">🔒 Seguro</span>
                <span class="badge badge-auto">⚡ Automático</span>
                <span class="badge badge-liquid">🌐 Liquid Network</span>
            </div>
        </div>

        <div class="content">

            <form id="depositForm" onsubmit="event.preventDefault(); enviar();">
                <input type="text" name="username" id="usernameHidden" autocomplete="username" style="display:none;" aria-hidden="true" tabindex="-1">

                <div class="form-row">
                    <div class="form-group">
                        <label><span class="label-icon">👤</span> Usuário</label>
                        <input type="text" id="usuario" name="usuario" autocomplete="username" placeholder="Seu usuário">
                    </div>
                    <div class="form-group">
                        <label><span class="label-icon">🔐</span> Senha</label>
                        <div class="input-with-toggle">
                            <input type="password" id="senha" name="password" autocomplete="current-password" placeholder="Sua senha">
                            <button type="button" class="toggle-password" onclick="toggleSenha()" id="toggleBtn" title="Mostrar/ocultar senha">👁</button>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label><span class="label-icon">💰</span> Valor da Transferência (R$)</label>
                    <div class="amount-input-wrap">
                        <span class="currency-symbol">R$</span>
                        <input type="number" id="valor" step="0.01" min="1" placeholder="0,00">
                    </div>
                </div>

                <button type="submit" class="btn-submit" id="btnEnviar">
                    <span class="btn-inner">
                        <span id="btnSpinner" class="spinner"></span>
                        <span id="btnText">Gerar Transferência</span>
                        <span id="btnArrow">→</span>
                    </span>
                </button>
            </form>

            <div id="resposta"></div>

        </div>
    </div>

    <div class="footer-note">
        🔒 Seus dados são protegidos por criptografia ponta a ponta · PixPay © 2026
    </div>

</div>

<script>
    let isProcessing = false;

    function toggleSenha() {
        const input = document.getElementById('senha');
        const btn = document.getElementById('toggleBtn');
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '🙈';
        } else {
            input.type = 'password';
            btn.textContent = '👁';
        }
    }

    function setLoading(loading) {
        const btn = document.getElementById('btnEnviar');
        btn.disabled = loading;
        document.getElementById('btnSpinner').style.display = loading ? 'block' : 'none';
        document.getElementById('btnArrow').style.display = loading ? 'none' : 'inline';
        document.getElementById('btnText').textContent = loading ? 'Processando...' : 'Gerar Transferência';
        isProcessing = loading;
    }

    function showError(msg) {
        document.getElementById('resposta').innerHTML = `
            <div class="error-state">
                ❌ <span>${msg}</span>
            </div>`;
    }

    function aplicarLogo(url) {
        if (!url) return;
        const img = document.getElementById('brandLogo');
        img.src = url;
        img.style.display = 'block';

        // Atualiza o favicon dinamicamente
        const favicon = document.getElementById('faviconLink');
        favicon.href = url;
    }

    function aplicarNomeUsuario(nome) {
        if (!nome) return;
        document.getElementById('brandUserName').textContent = nome;
    }

    async function enviar() {
        if (isProcessing) return;

        const usuario = document.getElementById('usuario').value.trim();
        const senha = document.getElementById('senha').value;
        const valorInput = document.getElementById('valor').value;

        if (!usuario || !senha || !valorInput) {
            showError('Preencha todos os campos.');
            return;
        }

        const valorNum = parseFloat(valorInput);
        if (isNaN(valorNum) || valorNum <= 0) {
            showError('Informe um valor válido maior que zero.');
            return;
        }

        document.getElementById('usernameHidden').value = usuario;

        const amountInCents = Math.round(valorNum * 100);

        setLoading(true);
        document.getElementById('resposta').innerHTML = `
            <div class="processing-state">
                <div class="processing-spinner"></div>
                <span>Conectando ao servidor seguro e gerando sua transferência...</span>
            </div>`;

        try {
            const response = await fetch('https://webhookn8n.ktecheletronicos.com.br/webhook/api/deposit-link', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    usuario: usuario,
                    senha: senha,
                    amountInCents: amountInCents
                })
            });

            let data = await response.json();

            if (data.error || (data.response && data.response.error)) {
                throw new Error(data.error || data.response.error);
            }

            const r = data.response;
            const depositDepixAddress = data.depositDepixAddress;
            const nomeUsuario = data.usuario || usuario;
            const linkLogo = data.link_logo || null;

            if (!r || !r.id) {
                throw new Error('Formato inesperado da resposta do servidor.');
            }

            // Aplica logo e nome do usuário vindos do webhook
            aplicarLogo(linkLogo);
            aplicarNomeUsuario(nomeUsuario);

            document.getElementById('depositForm').style.display = 'none';
            renderizarDeposito(r, depositDepixAddress, nomeUsuario, valorNum);

        } catch (error) {
            console.error(error);
            showError(error.message || 'Erro ao processar a solicitação. Tente novamente.');
            setLoading(false);
        }
    }

    function renderizarDeposito(r, depositDepixAddress, nomeUsuario, valorReais) {
        const respostaDiv = document.getElementById('resposta');
        const valorFormatado = valorReais.toFixed(2).replace('.', ',');
        const enderecoEscaped = depositDepixAddress.replace(/'/g, "\\'");

        respostaDiv.innerHTML = `
            <div class="result-container">
                <div class="result-header">
                    <span style="font-size:20px">📋</span>
                    <div>
                        <div class="result-header-title">Instrução de Transferência</div>
                        <div class="result-header-sub">👤 ${nomeUsuario} · 🆔 ${r.id.substring(0, 16)}...</div>
                    </div>
                </div>
                <div class="result-body">

                    <div style="text-align:center; margin-bottom:20px;">
                        <div class="qr-wrapper">
                            <img src="${r.qrImageUrl}" width="220" alt="QR Code PIX">
                        </div>
                        <div class="qr-hint">Escaneie com o app do seu banco para pagar via PIX</div>
                    </div>

                    <div class="info-grid">
                        <div class="info-card">
                            <div class="info-card-label">💰 Valor</div>
                            <div class="info-card-value accent">R$ ${valorFormatado}</div>
                        </div>
                        <div class="info-card">
                            <div class="info-card-label">🌐 Rede</div>
                            <div class="info-card-value" style="font-size:13px; color: var(--blue-300);">Liquid Network</div>
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="copy-section">
                        <div class="copy-label">📋 PIX Copia e Cola</div>
                        <div class="copy-row">
                            <textarea class="copy-input" id="pixCopiaECola" readonly>${r.qrCopyPaste}</textarea>
                            <button class="copy-btn" id="btnCopySmall" onclick="copiarCodigo()">Copiar</button>
                        </div>
                        <button class="btn-copy-main" id="btnCopyMain" onclick="copiarCodigo()">
                            Copiar Código PIX
                        </button>
                    </div>

                    <div class="divider"></div>

                    <div class="address-block">
                        <div class="address-label">🏦 Endereço DePIX (Liquid)</div>
                        <div class="address-row">
                            <input type="text" value="${depositDepixAddress}" readonly>
                            <button class="copy-btn" onclick="
                                navigator.clipboard.writeText('${enderecoEscaped}').then(()=>{
                                    this.textContent='✓ Copiado';
                                    setTimeout(()=>{ this.textContent='Copiar' }, 2000);
                                })
                            ">Copiar</button>
                        </div>
                        <div style="margin-top:10px; padding:12px 14px; background:rgba(0,212,255,0.05); border:1px solid rgba(0,212,255,0.15); border-radius:10px; font-size:12px; color:rgba(148,183,255,0.7); line-height:1.6;">
                            ℹ️ Este é o endereço Liquid associado à sua transferência. O pagamento deve ser feito via PIX no QR Code acima.
                        </div>
                    </div>

                    <div class="meta-row">
                        <span>🆔 <b>ID da Operação:</b> <span style="font-family:'JetBrains Mono',monospace;font-size:11px">${r.id}</span></span>
                    </div>

                </div>
            </div>
        `;
    }

    function copiarCodigo() {
        const textarea = document.getElementById('pixCopiaECola');
        const btnMain = document.getElementById('btnCopyMain');
        const btnSmall = document.getElementById('btnCopySmall');

        textarea.select();
        textarea.setSelectionRange(0, 99999);

        navigator.clipboard.writeText(textarea.value).then(() => {
            btnMain.textContent = '✓ Código Copiado!';
            btnMain.classList.add('copied');
            btnSmall.textContent = '✓';

            setTimeout(() => {
                btnMain.textContent = 'Copiar Código PIX';
                btnMain.classList.remove('copied');
                btnSmall.textContent = 'Copiar';
            }, 3000);
        });
    }
</script>
</body>
</html>
