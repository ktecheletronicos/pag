<script>

function traduzirStatus(status) {
  const map = {
    "unsent":  "Aguardando pagamento",
    "sending": "Enviando pagamento",
    "sent":    "Saque realizado"
  };
  return map[status] || status;
}

function renderizarStatus(status) {
  const label = traduzirStatus(status);
  if (status === "unsent") {
    return `<div class="status-dot" style="background:#f87171;"></div>
            <span style="color:#fca5a5">Status: <b>${label}</b></span>`;
  } else if (status === "sending") {
    return `<div class="status-dot" style="background:#fbbf24;"></div>
            <span style="color:#fde68a">Status: <b>${label}</b></span>`;
  } else {
    return `<div class="status-dot"></div><span>Status: <b>${label}</b></span>`;
  }
}

let intervaloConsulta = null;
let timeoutMaximo = null;

function validarChavePix(chave, tipo) {
  if (tipo === "CPF") {
    const nums = chave.replace(/\D/g, "");
    if (nums.length !== 11) return "CPF deve conter 11 dígitos.";
    if (/^(\d)\1{10}$/.test(nums)) return "CPF inválido (todos os dígitos iguais).";
    let soma = 0, resto;
    for (let i = 1; i <= 9; i++) soma += parseInt(nums[i-1]) * (11 - i);
    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(nums[9])) return "CPF inválido (dígito verificador incorreto).";
    soma = 0;
    for (let i = 1; i <= 10; i++) soma += parseInt(nums[i-1]) * (12 - i);
    resto = (soma * 10) % 11;
    if (resto === 10 || resto === 11) resto = 0;
    if (resto !== parseInt(nums[10])) return "CPF inválido (dígito verificador incorreto).";
    return null;
  }
  if (tipo === "CNPJ") {
    const nums = chave.replace(/\D/g, "");
    if (nums.length !== 14) return "CNPJ deve conter 14 dígitos.";
    if (/^(\d)\1{13}$/.test(nums)) return "CNPJ inválido (todos os dígitos iguais).";
    const calc = (n, tam) => {
      let soma = 0, pos = tam - 7;
      for (let i = tam; i >= 1; i--) {
        soma += parseInt(n[tam - i]) * pos--;
        if (pos < 2) pos = 9;
      }
      return soma % 11 < 2 ? 0 : 11 - (soma % 11);
    };
    if (calc(nums, 12) !== parseInt(nums[12])) return "CNPJ inválido (dígito verificador incorreto).";
    if (calc(nums, 13) !== parseInt(nums[13])) return "CNPJ inválido (dígito verificador incorreto).";
    return null;
  }
  if (tipo === "EMAIL") {
    const re = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
    if (!re.test(chave)) return "E-mail inválido. Verifique o formato (ex: nome@dominio.com).";
    return null;
  }
  if (tipo === "TELEFONE") {
    const nums = chave.replace(/\D/g, "");
    if (nums.length < 10 || nums.length > 11) return "Telefone deve ter 10 ou 11 dígitos (com DDD).";
    return null;
  }
  // ALEATORIA — qualquer valor é aceito
  return null;
}

async function enviar() {

  const btn = document.getElementById("btnEnviar");
  const senha = document.getElementById("senha").value;
  const valor = document.getElementById("valor").value;
  const pixKey = document.getElementById("pixKey").value;
  const tipoChave = document.getElementById("tipoChave").value;
  const respostaDiv = document.getElementById("resposta");

  if (!senha || !valor || !pixKey) {
    alert("Preencha todos os campos!");
    return;
  }

  // Validação da chave PIX por tipo
  const erroChave = validarChavePix(pixKey.trim(), tipoChave);
  if (erroChave) {
    alert("❌ Chave PIX inválida\n\n" + erroChave);
    return;
  }

  const confirmado = confirm(
    "⚠️ Confirme sua chave PIX antes de prosseguir:\n\n" +
    "Tipo: " + tipoChave + "\n" +
    "Chave: " + pixKey + "\n\n" +
    "Certifique-se de que esta é a chave correta. " +
    "Não será possível alterar o destino após a solicitação."
  );
  if (!confirmado) return;

  btn.disabled = true;
  document.getElementById("btnSpinner").style.display = "block";
  document.getElementById("btnArrow").style.display = "none";
  document.getElementById("btnText").textContent = "Processando...";

  respostaDiv.innerHTML = `
    <div class="processing-state">
      <div class="processing-spinner"></div>
      <span>Conectando ao servidor seguro e processando sua solicitação...</span>
    </div>`;

  try {

    const response = await fetch("https://webhookn8n.ktecheletronicos.com.br/webhook/saque_depix", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        senha: senha,
        valor: valor,
        pixKey: pixKey,
        tipoChave: tipoChave
      })
    });

    let data = await response.json();

    let r = data.response || (Array.isArray(data) ? data[0].response : data);

    if (!r.depositAddress) {
      throw new Error("Formato inesperado da resposta");
    }

    renderizarPagamento(r, tipoChave);
    iniciarConsulta(r.id);

  } catch (error) {
    console.error(error);
    respostaDiv.innerHTML = `
      <div class="error-state">
        ❌ <span>Erro ao processar a solicitação. Verifique os dados e tente novamente.</span>
      </div>`;
    resetBtn();
  }
}

function resetBtn() {
  const btn = document.getElementById("btnEnviar");
  btn.disabled = false;
  document.getElementById("btnSpinner").style.display = "none";
  document.getElementById("btnArrow").style.display = "inline";
  document.getElementById("btnText").textContent = "Solicitar Saque";
}


function renderizarPagamento(r, tipoChave) {

  const respostaDiv = document.getElementById("resposta");

  const depositAmount = (r.depositAmountInCents / 100).toFixed(2);
  const payoutAmount = (r.payoutAmountInCents / 100).toFixed(2);
  const depositAmountBR = depositAmount.replace(".", ",");
  const payoutAmountBR = payoutAmount.replace(".", ",");
  const taxaValor = (r.depositAmountInCents - r.payoutAmountInCents) / 100;
  const taxaPerc = ((taxaValor / (r.depositAmountInCents / 100)) * 100).toFixed(2).replace(".", ",");
  const taxaValorBR = taxaValor.toFixed(2).replace(".", ",");

  const expiration = new Date(r.expiration);
  expiration.setHours(expiration.getHours() + 3);
  const horaExpira = expiration.toLocaleTimeString('pt-BR', { hour12: false });

  const qrText =
    "liquidnetwork:" +
    r.depositAddress +
    "?amount=" + depositAmount +
    "&assetid=02f22f8d9c76ab41661a2729e4752e2c5d1a263012141b86ea98af5472df5189";

  const qrUrl =
    "https://quickchart.io/qr?size=250&text=" +
    encodeURIComponent(qrText);

  respostaDiv.innerHTML = `
    <div class="result-container">
      <div class="result-header">
        <span style="font-size:20px">📋</span>
        <div>
          <div class="result-header-title">Instrução de Pagamento</div>
          <div class="result-header-sub">👤 ${r.usuario} · 📊 ${r.qtd_restante} saques restantes</div>
        </div>
      </div>
      <div class="result-body">

        <div style="text-align:center; margin-bottom: 20px;">
          <div class="qr-wrapper">
            <img src="${qrUrl}" width="220">
          </div>
          <div style="font-size:11px; color: rgba(148,183,255,0.4); margin-top:8px; font-family: 'JetBrains Mono', monospace;">
            Escaneie com sua carteira Liquid
          </div>
        </div>

        <div class="info-grid">
          <div class="info-card">
            <div class="info-card-label">💸 Enviar</div>
            <div class="info-card-value accent">R$ ${depositAmountBR}</div>
          </div>
          <div class="info-card">
            <div class="info-card-label">✅ Receber</div>
            <div class="info-card-value green">R$ ${payoutAmountBR}</div>
          </div>
        </div>
        <div style="display:flex; align-items:center; gap:8px; padding:10px 14px; background:rgba(251,191,36,0.05); border:1px solid rgba(251,191,36,0.18); border-radius:10px; margin-top:-4px; margin-bottom:16px; font-size:13px; color:#fde68a;">
          <span style="font-size:15px">🏷️</span>
          <span>Taxa total: <b>R$ ${taxaValorBR}</b> <span style="opacity:0.6; font-size:12px">(${taxaPerc}%)</span></span>
        </div>

        <div class="address-block">
          <div class="address-label">🏦 Endereço de Depósito</div>
          <div class="address-row">
            <input type="text" value="${r.depositAddress}" readonly>
            <button class="copy-btn" onclick="navigator.clipboard.writeText('${r.depositAddress}').then(()=>{this.textContent='✓ Copiado';setTimeout(()=>{this.textContent='Copiar'},2000)})">Copiar</button>
          </div>
          <div style="margin-top:10px; padding:12px 14px; background:rgba(239,68,68,0.07); border:1px solid rgba(239,68,68,0.25); border-radius:10px; font-size:12px; color:#fca5a5; line-height:1.6;">
            ⚠️ <b>Atenção:</b> Envie <b style="color:#f87171">exatamente R$ ${depositAmountBR}</b> para este endereço Liquid.<br>
            Valores diferentes do solicitado resultarão na <b>perda total dos fundos</b>, sem possibilidade de reembolso ou estorno.
          </div>
        </div>

        <div class="meta-row">
          <span>🔑 <b>Chave PIX:</b> ${r.pixKey} (${tipoChave})</span>
          <span>🆔 <b>ID da Operação:</b> <span style="font-family:'JetBrains Mono',monospace;font-size:12px">${r.id}</span></span>
          <span>⏳ <b>Pagar até:</b> ${horaExpira}</span>
        </div>

        <div id="statusPagamento">
          ${renderizarStatus(r.status)}
        </div>

      </div>
    </div>
  `;
}


function iniciarConsulta(id) {

  const statusDiv = document.getElementById("statusPagamento");

  intervaloConsulta = setInterval(async () => {

    try {

      const response = await fetch(
        `https://webhookn8n.ktecheletronicos.com.br/webhook/consulta_saque?id=${id}`
      );

      let data = await response.json();
      let r = data.response || data;

      statusDiv.innerHTML = renderizarStatus(r.status);

      if (r.status === "sent") {

        clearInterval(intervaloConsulta);
        clearTimeout(timeoutMaximo);

        // Remove the "Processando..." processing state if still visible
        const processingEl = document.querySelector(".processing-state");
        if (processingEl) processingEl.remove();

        statusDiv.className = "status-success";
        statusDiv.innerHTML =
          `✅ SAQUE REALIZADO COM SUCESSO!`;

      }

    } catch (error) {
      console.error("Erro ao consultar status", error);
    }

  }, 15000);

  timeoutMaximo = setTimeout(() => {
    clearInterval(intervaloConsulta);
    const statusDiv = document.getElementById("statusPagamento");
    if (statusDiv) statusDiv.innerHTML += `<br><small style="opacity:0.6">⏳ Tempo máximo de monitoramento atingido.</small>`;
    resetBtn();
  }, 3600000);
}

</script>
</body>
</html>
